version: '3.8'

services:
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    ports:
      - '8080:8080'
      - '7077:7077'
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    hostname: spark-master
    volumes:
      - ./jobs:/opt/spark-apps
      - ./data:/opt/data
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:latest
    container_name: spark-worker-1
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    hostname: spark-worker-1
    volumes:
      - ./jobs:/opt/spark-apps
      - ./data:/opt/data
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:latest
    container_name: spark-worker-2
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    hostname: spark-worker-2
    volumes:
      - ./jobs:/opt/spark-apps
      - ./data:/opt/data
    networks:
      - spark-net

  spark-worker-3:
    image: apache/spark:latest
    container_name: spark-worker-3
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    hostname: spark-worker-3
    volumes:
      - ./jobs:/opt/spark-apps
      - ./data:/opt/data
    networks:
      - spark-net

  airflow:
    image: apache/airflow:2.7.1
    container_name: airflow-standalone
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=chembl_webresource_client pandas
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres-db:5432/chembl
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    ports:
      - "8081:8080"
    #command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver & airflow scheduler"
    command: bash -c "exec airflow webserver"
      - spark-master
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/data
      - ./scripts:/opt/scripts
    networks:
      - spark-net

  postgres-db:
    image: postgres:13
    container_name: chembl_postgres
    environment:
      - POSTGRES_USER=airflow_user
      - POSTGRES_PASSWORD=airflow_pass
      - POSTGRES_DB=chembl
    ports:
      - "5432:5432" # Udostępnienie portu, abyś mógł łączyć się lokalnie z PC
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
